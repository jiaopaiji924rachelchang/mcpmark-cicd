name: Deployment Status

on:
  push:
    branches: [ main ]

jobs:
  pre-deployment:
    runs-on: ubuntu-latest
    outputs:
      issue_number: ${{ steps.create_issue.outputs.issue_number }}
      previous_commit: ${{ steps.get_previous_commit.outputs.previous_commit }}
      package_version: ${{ steps.get_package_version.outputs.package_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Get previous commit

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run test
        run: npm run test

      - name: Get previous commit SHA
        id: get_previous_commit
        run: echo "previous_commit=$(git log -1 --pretty=format:"%H" HEAD~1)" >> $GITHUB_OUTPUT

      - name: Get package version
        id: get_package_version
        run: echo "package_version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create deployment tracking issue
        id: create_issue
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deployment Tracking - ${context.sha}`,
              body: `
              ## Deployment Tracking
              - Previous Commit: ${{ steps.get_previous_commit.outputs.previous_commit }}
              - Current Commit: ${context.sha}
              - Package Version: ${{ steps.get_package_version.outputs.package_version }}
              `,
              labels: ['deployment', 'in-progress']
            });
            return issue.number;
          result-encoding: string

      - name: Post pre-deployment comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.create_issue.outputs.issue_number }},
              body: "Pre-deployment checks completed"
            });

  rollback-preparation:
    runs-on: ubuntu-latest
    needs: pre-deployment
    outputs:
      artifact_name: ${{ steps.create_artifact.outputs.artifact_name }}
      checksum: ${{ steps.generate_checksum.outputs.checksum }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create rollback script
        run: |
          cat > rollback.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail

          # Rollback script for Node.js project
          echo "Starting rollback process..."

          # Check if previous commit is provided
          if [ -z "$1" ]; then
            echo "Error: Previous commit SHA is required"
            exit 1
          fi

          PREVIOUS_COMMIT=$1

          # Checkout previous commit
          echo "Checking out previous commit: $PREVIOUS_COMMIT"
          git checkout $PREVIOUS_COMMIT

          # Reinstall dependencies
          echo "Reinstalling dependencies..."
          npm ci

          # Restore configuration files
          echo "Restoring configuration files..."
          if [ -f "package.json.backup" ]; then
            cp package.json.backup package.json
          fi
          if [ -f "package-lock.json.backup" ]; then
            cp package-lock.json.backup package-lock.json
          fi
          if [ -f ".env.example.backup" ]; then
            cp .env.example.backup .env.example
          fi

          echo "Rollback completed successfully!"
          EOF
          chmod +x rollback.sh

      - name: Create configuration backups
        run: |
          cp package.json package.json.backup
          cp package-lock.json package-lock.json.backup
          if [ -f ".env.example" ]; then
            cp .env.example .env.example.backup
          fi

      - name: Create dependency verification script
        run: |
          cat > verify-dependencies.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail

          # Dependency verification script
          echo "Verifying dependencies compatibility..."

          # Check if package-lock.json exists
          if [ ! -f "package-lock.json" ]; then
            echo "Error: package-lock.json not found"
            exit 1
          fi

          # Verify dependency tree
          npm ls --depth=0

          echo "Dependencies verified successfully!"
          EOF
          chmod +x verify-dependencies.sh

      - name: Create rollback documentation
        run: |
          cat > ROLLBACK.md << 'EOF'
          # Rollback Instructions

          ## Step 1: Download Rollback Artifact
          Download the rollback package from the GitHub Actions artifacts.

          ## Step 2: Extract the Package
          unzip rollback-package-*.zip

          ## Step 3: Run Rollback Script
          cd rollback-package-*
          ./rollback.sh <previous-commit-sha>

          ## Step 4: Verify Rollback
          - Check that the code is at the previous commit
          - Run npm install to ensure dependencies are correct
          - Run npm test to verify functionality
          - Check configuration files are restored

          ## Step 5: Monitor Application
          Ensure the application is running correctly after rollback.
          EOF

      - name: Create compressed rollback package
        id: create_artifact
        run: |
          ARTIFACT_NAME="rollback-package-${{ github.sha }}"
          mkdir -p $ARTIFACT_NAME
          cp rollback.sh $ARTIFACT_NAME/
          cp package.json.backup $ARTIFACT_NAME/
          cp package-lock.json.backup $ARTIFACT_NAME/
          if [ -f ".env.example.backup" ]; then
            cp .env.example.backup $ARTIFACT_NAME/
          fi
          cp verify-dependencies.sh $ARTIFACT_NAME/
          cp ROLLBACK.md $ARTIFACT_NAME/
          zip -r $ARTIFACT_NAME.zip $ARTIFACT_NAME/
          echo "artifact_name=$ARTIFACT_NAME.zip" >> $GITHUB_OUTPUT

      - name: Generate SHA256 checksum
        id: generate_checksum
        run: |
          CHECKSUM=$(sha256sum ${{ steps.create_artifact.outputs.artifact_name }} | awk '{print $1}')
          echo "checksum=$CHECKSUM" >> $GITHUB_OUTPUT

      - name: Upload rollback artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.create_artifact.outputs.artifact_name }}
          path: ${{ steps.create_artifact.outputs.artifact_name }}
          retention-days: 30

      - name: Post rollback plan comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue_number }},
              body: `
              ## 🔄 Rollback Plan Ready

              - Previous Commit: ${{ needs.pre-deployment.outputs.previous_commit }}
              - Current Commit: ${{ github.sha }}
              - Package Version: ${{ needs.pre-deployment.outputs.package_version }}
              - Artifact: ${{ steps.create_artifact.outputs.artifact_name }}

              ✅ Rollback script created
              ✅ Configuration backups completed
              ✅ Dependency verification script created
              ✅ Rollback documentation generated
              ✅ Compressed rollback package created

              ### Quick Rollback Command
              \`\`\`bash
              # Download the artifact first, then:
              unzip ${{ steps.create_artifact.outputs.artifact_name }}
              cd ${{ steps.create_artifact.outputs.artifact_name }}.zip
              ./rollback.sh ${{ needs.pre-deployment.outputs.previous_commit }}
              \`\`\`

              - Rollback script created: true
              - Configuration backup: true
              - SHA256: ${{ steps.generate_checksum.outputs.checksum }}
              `
            });

  post-deployment:
    runs-on: ubuntu-latest
    needs: [pre-deployment, rollback-preparation]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update issue labels
        uses: actions/github-script@v7
        with:
          script: |
            // Remove in-progress label
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue_number }},
              name: 'in-progress'
            });

            // Add completed label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue_number }},
              labels: ['completed']
            });

      - name: Post final comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue_number }},
              body: `
              ## Deployment Completed Successfully

              Rollback artifact details:
              - Artifact Name: ${{ needs.rollback-preparation.outputs.artifact_name }}
              - SHA256 Checksum: ${{ needs.rollback-preparation.outputs.checksum }}
              `
            });

      - name: Close deployment issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue_number }},
              state: 'closed'
            });
